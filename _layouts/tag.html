---
layout: default
---
<section>
  <h1 class="tag-title">{{ page.title }}</h1>
  <ul class="post-list">
    {% for post in page.posts %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a>
      <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
    </li>
    {% endfor %}
  </ul>
</section>
